<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全学年智能默写基地-超级进化版</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f9ff; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; touch-action: none; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; width: 95%; max-width: 800px; text-align: center; box-sizing: border-box; position: relative; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 8px 15px; border-radius: 12px; margin-bottom: 12px; font-size: 15px; font-weight: bold; color: #166534; }
        .selector-zone { background: #e0f2fe; border-radius: 12px; padding: 12px; margin-bottom: 15px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; align-items: center; }
        select { font-size: 16px; padding: 8px; border-radius: 6px; border: 2px solid #bae6fd; background: white; }
        .nav-tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { background: none; color: #64748b; font-size: 18px; font-weight: bold; padding: 5px 15px; border: none; cursor: pointer; }
        .tab-btn.active { color: #0ea5e9; border-bottom: 3px solid #0ea5e9; }
        .pinyin { font-size: 40px; color: #0284c7; font-weight: bold; margin: 10px 0; }
        .canvas-container { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .tianzhige-canvas {
            border: 4px solid #e11d48; border-radius: 12px; background-color: #fff;
            background-image: 
                linear-gradient(to bottom, transparent 49%, rgba(225, 29, 72, 0.25) 49%, rgba(225, 29, 72, 0.25) 51%, transparent 51%),
                linear-gradient(to right, transparent 49%, rgba(225, 29, 72, 0.25) 49%, rgba(225, 29, 72, 0.25) 51%, transparent 51%);
            background-size: 100% 100%; touch-action: none;
        }
        button { background-color: #0ea5e9; color: white; border: none; padding: 14px 28px; font-size: 20px; border-radius: 10px; cursor: pointer; margin: 5px; user-select: none; }
        .btn-success { background-color: #16a34a; }
        .btn-error { background-color: #dc2626; }
        .btn-tool { background-color: #e2e8f0; color: #334155; border: 2px solid #cbd5e1; }
        .btn-tool.active { background-color: #38bdf8; color: white; border-color: #0284c7; }
        .review-list { text-align: left; margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .review-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .badge { color: #ef4444; padding: 4px 12px; border-radius: 12px; font-size: 14px; font-weight: bold; }
        
        /* 五子棋游戏区域样式 */
        #gobang-zone { display: none; background: #fef08a; border: 3px dashed #ca8a04; border-radius: 16px; padding: 15px; margin-top: 15px; text-align: center; }
        .gobang-board { display: grid; grid-template-columns: repeat(11, 28px); grid-template-rows: repeat(11, 28px); gap: 1px; background: #d97706; padding: 4px; border-radius: 6px; width: 318px; margin: 10px auto; border: 2px solid #92400e; }
        .gobang-cell { background: #fcd34d; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="card">
        <!-- 勋章与积分动态展示栏 -->
        <div class="status-bar">
            <span id="player-rank">当前段位: 🥚 词语萌蛋</span>
            <span id="player-score">核心积分: 0 分</span>
        </div>

        <div class="selector-zone">
            <select id="sel-grade" onchange="onGradeChange()"><option>暂无数据</option></select>
            <select id="sel-term" onchange="onTermChange()"><option>暂无数据</option></select>
            <select id="sel-unit"><option>暂无数据</option></select>
            <button style="font-size:16px; padding:8px 16px; margin:0;" onclick="loadSelectedUnit()">🎯 加载关卡</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-moxie" onclick="switchMode('moxie')">✍️ 开始默写</button>
            <button class="tab-btn" id="tab-review" onclick="switchMode('review')">😈 错字仓库</button>
            <button class="tab-btn" id="tab-archive" onclick="switchMode('archive')">📚 错题档案馆</button>
        </div>

        <div id="moxie-view">
            <div id="progress" style="font-size:18px; color:#64748b;">进度: 0/0</div>
            <div class="pinyin" id="pinyin-display">请先选择年级单元并加载</div>
            
            <div style="margin-bottom: 10px;">
                <button class="btn-tool active" id="tool-pen" onclick="setTool('pen')">✏️ 写字笔</button>
                <button class="btn-tool" id="tool-eraser" onclick="setTool('eraser')">🧽 橡皮擦</button>
            </div>
            
            <div class="canvas-container" id="canvas-container"></div>
            
            <div style="margin-top: 15px;">
                <button class="btn-tool" id="prev-btn" onclick="prevWord()" style="display: none; background-color:#64748b; color:white;">⬅️ 前一题</button>
                <button id="next-btn" onclick="nextWord()" style="display:none;">写好了，下一题 ➡️</button>
            </div>
        </div>

        <!-- 家长统一批改视窗 -->
        <div id="pigai-view" style="display: none;">
            <h3>🧐 家长统一批改时间</h3>
            <div class="pinyin" id="pigai-pinyin"></div>
            <div style="font-size: 60px; color: #e11d48; font-weight: bold; margin: 10px; letter-spacing: 10px;" id="pigai-answer"></div>
            <div>
                <button class="btn-success" onclick="judge(true)">✅ 写对了</button>
                <button class="btn-error" onclick="judge(false)">❌ 写错了</button>
            </div>
            <!-- 撤销按钮放置在此处避免手滑 -->
            <div style="margin-top: 12px;">
                <button id="pigai-prev-btn" onclick="prevPigai()" style="background-color: #64748b; font-size: 16px; padding: 8px 20px;">🚫 撤销一步（回上一题）</button>
            </div>
            <div id="pigai-canvas-display" class="canvas-container"></div>
        </div>

        <div id="review-view" style="display: none;">
            <h3>😈 易错字临时复习站</h3>
            <button class="btn-success" style="width:100%;" onclick="startReviewMode('current')">🚀 开启当前错字复习</button>
            <div class="review-list" id="review-list-container"></div>
        </div>

        <div id="archive-view" style="display: none;">
            <h3>📚 永久错题档案馆</h3>
            <button class="btn-success" style="width:100%; background-color:#8b5cf6;" onclick="startReviewMode('archive')">🔄 档案馆错题一键特训</button>
            <div class="review-list" id="archive-list-container"></div>
        </div>

        <!-- 内置五子棋游戏小彩蛋面板 -->
        <div id="gobang-zone">
            <h3 style="margin:5px 0; color:#92400e;">🎉 达成卓越突破！解锁神秘棋局 ♟️</h3>
            <p style="margin:5px 0; font-size:14px; color:#b45309;">规则: 小朋友执黑子（⚫），AI执白子（⚪），连成五子即获胜！</p>
            <div class="gobang-board" id="gobang-board"></div>
            <div style="margin-top: 10px;">
                <span id="gobang-status" style="font-weight:bold; color:#78350f;">轮到你了，请落子...</span>
                <button onclick="closeGobang()" style="font-size:14px; padding:6px 12px; background-color:#b45309; margin-left:15px;">关闭游戏</button>
            </div>
        </div>
    </div>

<script>
    let allWordsFlat = []; 
    let wordList = []; let currentIndex = 0; let savedCanvasesData = []; let pigaiIndex = 0;
    let currentModeState = 'moxie'; let currentTool = 'pen';
    let currentCanvases = []; let currentCtxs = [];

    // 家长批改栈历史记录结构
    let pigaiHistory = [];

    // 状态持久化存储
    let errorStorage = JSON.parse(localStorage.getItem('moxie_errors')) || {};
    let permanentArchive = JSON.parse(localStorage.getItem('moxie_archive')) || {};
    let currentExp = parseInt(localStorage.getItem('moxie_exp')) || 0;

    // 五子棋内部引擎数据
    let gobangBoardData = [];
    let isGobangGameOver = false;

    window.onload = async () => {
        try {
            const response = await fetch('words.json');
            allWordsFlat = await response.json();
            if(Array.isArray(allWordsFlat) && allWordsFlat.length > 0) {
                initSelectors(); 
            } else {
                alert("警告：words.json 数据为空或格式不是扁平数组。");
            }
        } catch (e) {
            alert("读取词库失败，具体错误原因: " + e.message);
        }
        updateExpDisplay();
        switchMode('moxie');
    };

    // 积分与进化链分发引擎
    function updateExpDisplay() {
        document.getElementById('player-score').innerText = `核心积分: ${currentExp} 分`;
        let rankStr = "🥚 词语萌蛋";
        if (currentExp > 50 && currentExp <= 200) rankStr = "🐣 破壳小雏";
        else if (currentExp > 200 && currentExp <= 500) rankStr = "🐥 识字小鸡";
        else if (currentExp > 500 && currentExp <= 1000) rankStr = "🦅 飞天神鹰";
        else if (currentExp > 1000) rankStr = "🐉 错题终结巨龙";
        document.getElementById('player-rank').innerText = `当前段位: ${rankStr}`;
        localStorage.setItem('moxie_exp', currentExp);
    }

    function initSelectors() {
        const grades = [...new Set(allWordsFlat.map(item => item.grade).filter(Boolean))];
        if(grades.length === 0) {
            alert("诊断提示：未能从词库中解析出【年级】字段，请检查文件。");
            return;
        }
        updateSelectOptions('sel-grade', grades);
        onGradeChange();
    }

    function onGradeChange() {
        const grade = document.getElementById('sel-grade').value;
        const filtered = allWordsFlat.filter(item => item.grade === grade);
        const terms = [...new Set(filtered.map(item => item.term).filter(Boolean))];
        updateSelectOptions('sel-term', terms);
        onTermChange();
    }

    function onTermChange() {
        const grade = document.getElementById('sel-grade').value;
        const term = document.getElementById('sel-term').value;
        const filtered = allWordsFlat.filter(item => item.grade === grade && item.term === term);
        const units = [...new Set(filtered.map(item => item.unit).filter(Boolean))];
        updateSelectOptions('sel-unit', units);
    }

    function updateSelectOptions(id, list) {
        const sel = document.getElementById(id);
        sel.innerHTML = "";
        list.forEach(val => { const op = document.createElement('option'); op.innerText = val; sel.appendChild(op); });
    }

    function loadSelectedUnit() {
        try {
            const g = document.getElementById('sel-grade').value;
            const t = document.getElementById('sel-term').value;
            const u = document.getElementById('sel-unit').value;

            const targets = allWordsFlat.filter(item => item.grade === g && item.term === t && item.unit === u);
            
            if(targets && targets.length > 0) {
                const mappedWords = targets.map(item => ({ pinyin: item.pinyin, hanzi: item.hanzi }));
                initGame(mappedWords, 'moxie');
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                alert(`未找到匹配数据。当前选择: ${g}-${t}-${u}。`);
            }
        } catch(err) {
            alert("点击加载发生内部错误: " + err.message);
        }
    }

    function switchMode(mode) {
        document.getElementById('tab-moxie').classList.toggle('active', mode === 'moxie');
        document.getElementById('tab-review').classList.toggle('active', mode === 'review');
        document.getElementById('tab-archive').classList.toggle('active', mode === 'archive');
        document.getElementById('moxie-view').style.display = mode === 'moxie' ? 'block' : 'none';
        document.getElementById('pigai-view').style.display = 'none';
        document.getElementById('review-view').style.display = mode === 'review' ? 'block' : 'none';
        document.getElementById('archive-view').style.display = mode === 'archive' ? 'block' : 'none';
        if(mode === 'review') renderErrorList();
        if(mode === 'archive') renderArchiveList();
    }

    function setTool(tool) {
        currentTool = tool;
        document.getElementById('tool-pen').classList.toggle('active', tool === 'pen');
        document.getElementById('tool-eraser').classList.toggle('active', tool === 'eraser');
    }

    function initGame(list, modeType = 'moxie') {
        wordList = [...list]; currentIndex = 0; savedCanvasesData = []; currentModeState = modeType;
        setTool('pen'); switchMode('moxie'); loadWord();
    }

    function loadWord() {
        if(wordList.length === 0) return;
        if(currentIndex >= wordList.length) { startPigaiMode(); return; }
        
        document.getElementById('prev-btn').style.display = currentIndex > 0 ? 'inline-block' : 'none';
        document.getElementById('progress').innerText = `${currentIndex + 1}/${wordList.length}`;
        const word = wordList[currentIndex];
        document.getElementById('pinyin-display').innerText = word.pinyin || "无拼音";
        
        const container = document.getElementById('canvas-container');
        container.innerHTML = ""; currentCanvases = []; currentCtxs = [];
        const hz = word.hanzi || "";
        const boxSize = hz.length > 3 ? 120 : 180;
        
        for(let i = 0; i < hz.length; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = boxSize; canvas.height = boxSize; canvas.className = "tianzhige-canvas";
            container.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            currentCanvases.push(canvas); currentCtxs.push(ctx);
            setupDrawing(canvas, ctx);
        }

        if (savedCanvasesData[currentIndex]) {
            savedCanvasesData[currentIndex].forEach((src, i) => {
                const img = new Image(); img.src = src;
                img.onload = () => { if(currentCtxs[i]) currentCtxs[i].drawImage(img, 0, 0); };
            });
        }
    }

    function setupDrawing(canvas, ctx) {
        let drawing = false;
        function startDraw(e) { drawing = true; draw(e); }
        function endDraw() { drawing = false; ctx.beginPath(); }
        function draw(e) {
            if(!drawing) return; e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left; const y = clientY - rect.top;
            
            if (currentTool === 'pen') {
                ctx.globalCompositeOperation = 'source-over'; ctx.lineWidth = 5; ctx.lineCap = "round"; ctx.strokeStyle = "#1e293b";
            } else {
                ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 25; ctx.lineCap = "round";
            }
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }
        canvas.addEventListener('mousedown', startDraw); canvas.addEventListener('mouseup', endDraw); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', startDraw); canvas.addEventListener('touchend', endDraw); canvas.addEventListener('touchmove', draw);
    }

    function nextWord() {
        savedCanvasesData[currentIndex] = currentCanvases.map(c => c.toDataURL());
        currentIndex++; loadWord();
    }

    function prevWord() { if (currentIndex > 0) { currentIndex--; loadWord(); } }

    function startPigaiMode() {
        document.getElementById('moxie-view').style.display = 'none';
        document.getElementById('pigai-view').style.display = 'block';
        pigaiIndex = 0; 
        pigaiHistory = []; // 初始化清空批改历史栈
        showPigaiItem();
    }

    function showPigaiItem() {
        if(pigaiIndex >= wordList.length) {
            // 缓存原本错题库的长度，用于逻辑比对
            const errorKeysBefore = Object.keys(errorStorage).length;

            alert("🎉 全部批改完毕！");
            localStorage.setItem('moxie_errors', JSON.stringify(errorStorage));
            localStorage.setItem('moxie_archive', JSON.stringify(permanentArchive));
            
            const errorKeysAfter = Object.keys(errorStorage).length;
            
            // 判定条件：触发五子棋彩蛋
            // 条件一：当前处于“临时复习站”且原本的错题被完全消灭干净了
            // 条件二：触发了每100个单词的累积门槛
            if ((currentModeState === 'current_review' && errorKeysBefore > 0 && errorKeysAfter === 0) || (currentExp > 0 && currentExp % 100 === 0)) {
                openGobangGame();
            }

            switchMode(currentModeState === 'archive_review' ? 'archive' : 'review');
            return;
        }
        const word = wordList[pigaiIndex];
        document.getElementById('pigai-pinyin').innerText = word.pinyin || "";
        document.getElementById('pigai-answer').innerText = word.hanzi || "";
        const container = document.getElementById('pigai-canvas-display'); container.innerHTML = "";
        const imgs = savedCanvasesData[pigaiIndex];
        if(imgs) {
            imgs.forEach(src => {
                const img = document.createElement('img'); img.src = src;
                img.style.border = "2px solid #cbd5e1"; img.style.borderRadius = "8px"; img.style.backgroundColor = "#fff";
                img.style.width = (word.hanzi && word.hanzi.length > 3) ? "100px" : "140px"; container.appendChild(img);
            });
        }
    }

    function judge(isCorrect) {
        const word = wordList[pigaiIndex];
        if(!word) return;

        // 压入状态栈，深度拷贝副本，供撤销使用
        pigaiHistory.push({
            index: pigaiIndex,
            word: JSON.parse(JSON.stringify(word)),
            judgeResult: isCorrect,
            hadInErrorStorage: !!errorStorage[word.hanzi],
            hadInArchive: !!permanentArchive[word.hanzi]
        });

        if (!isCorrect) {
            if(!permanentArchive[word.hanzi]) permanentArchive[word.hanzi] = { pinyin: word.pinyin, count: 1 };
            else permanentArchive[word.hanzi].count += 1;
            
            if(!errorStorage[word.hanzi]) errorStorage[word.hanzi] = { pinyin: word.pinyin, count: 1 };
            else errorStorage[word.hanzi].count += 1;
        } else {
            // 正确则赚取积分加分
            currentExp += 1;
            updateExpDisplay();

            if(errorStorage[word.hanzi]) {
                errorStorage[word.hanzi].count -= 1;
                if(errorStorage[word.hanzi].count <= 0) delete errorStorage[word.hanzi];
            }
        }
        pigaiIndex++; 
        showPigaiItem();
    }

    // 撤销逻辑函数
    function prevPigai() {
        if (pigaiHistory.length === 0) {
            alert("前面没有题目了，无法回退。");
            return;
        }
        
        // 弹出最后一步的操作数据
        const lastAction = pigaiHistory.pop();
        pigaiIndex = lastAction.index;
        const word = lastAction.word;

        // 如果上次点的是“写对了”，回退时需要把刚刚加上的积分扣减掉
        if (lastAction.judgeResult) {
            currentExp = Math.max(0, currentExp - 1);
            updateExpDisplay();
            
            // 恢复错题库的计数器状态
            if (lastAction.hadInErrorStorage) {
                if (!errorStorage[word.hanzi]) errorStorage[word.hanzi] = { pinyin: word.pinyin, count: 1 };
                else errorStorage[word.hanzi].count += 1;
            }
        } else {
            // 如果上次点的是“写错了”，回退时需要把刚刚多加进数据库的脏数据剔除
            if (permanentArchive[word.hanzi]) {
                permanentArchive[word.hanzi].count -= 1;
                if (permanentArchive[word.hanzi].count <= 0) delete permanentArchive[word.hanzi];
            }
            if (errorStorage[word.hanzi]) {
                errorStorage[word.hanzi].count -= 1;
                if (errorStorage[word.hanzi].count <= 0) delete errorStorage[word.hanzi];
            }
        }

        showPigaiItem();
    }

    function renderErrorList() {
        const container = document.getElementById('review-list-container'); container.innerHTML = "";
        const keys = Object.keys(errorStorage);
        if(keys.length === 0) { container.innerHTML = "<p style='color:#16a34a;text-align:center;'>🎉 当前轮次错字已完全清除！</p>"; return; }
        keys.forEach(key => {
            const div = document.createElement('div'); div.className = "review-item";
            div.innerHTML = `<div><strong>${key}</strong> <span style="color:#64748b; font-size:14px;">(${errorStorage[key].pinyin})</span></div><span class="badge" style="background:#fee2e2;">待纠正</span>`;
            container.appendChild(div);
        });
    }

    function renderArchiveList() {
        const container = document.getElementById('archive-list-container'); container.innerHTML = "";
        const keys = Object.keys(permanentArchive);
        if(keys.length === 0) { container.innerHTML = "<p style='color:#64748b;text-align:center;'>档案馆暂无历史错字记录。</p>"; return; }
        keys.forEach(key => {
            const div = document.createElement('div'); div.className = "review-item";
            div.innerHTML = `<div><strong>${key}</strong> <span style="color:#64748b; font-size:14px;">(${permanentArchive[key].pinyin})</span></div><span class="badge" style="background:#f3e8ff; color:#7c3aed;">累计错: ${permanentArchive[key].count} 次</span>`;
            container.appendChild(div);
        });
    }

    function startReviewMode(type) {
        const storage = type === 'current' ? errorStorage : permanentArchive;
        const keys = Object.keys(storage);
        if(keys.length === 0) { alert("这里目前没有词语需要复习哦！"); return; }
        let reviewList = []; keys.forEach(key => reviewList.push({ hanzi: key, pinyin: storage[key].pinyin }));
        reviewList.sort(() => Math.random() - 0.5);
        initGame(reviewList, type === 'current' ? 'current_review' : 'archive_review');
    }

    /* ==========================================================================
       轻量级单机五子棋核心底层算法引擎（无任何外部加载项）
       ========================================================================== */
    function openGobangGame() {
        document.getElementById('gobang-zone').style.display = 'block';
        initGobangBoard();
    }

    function closeGobang() {
        document.getElementById('gobang-zone').style.display = 'none';
    }

    function initGobangBoard() {
        const boardElement = document.getElementById('gobang-board');
        boardElement.innerHTML = "";
        gobangBoardData = Array(11).fill(null).map(() => Array(11).fill(0));
        isGobangGameOver = false;
        document.getElementById('gobang-status').innerText = "挑战开始！请你落子(黑)...";

        for (let r = 0; r < 11; r++) {
            for (let c = 0; c < 11; c++) {
                const cell = document.createElement('div');
                cell.className = 'gobang-cell';
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.onclick = (e) => handleGobangClick(r, c);
                boardElement.appendChild(cell);
            }
        }
    }

    function handleGobangClick(r, c) {
        if (isGobangGameOver || gobangBoardData[r][c] !== 0) return;

        // 玩家落子逻辑 (黑子：1)
        makeGobangMove(r, c, 1);
        if (checkGobangWin(r, c, 1)) {
            document.getElementById('gobang-status').innerText = "🎉 太棒了！你战胜了AI！";
            isGobangGameOver = true;
            return;
        }

        // AI 自动响应防守落子逻辑 (白子：2)
        document.getElementById('gobang-status').innerText = "AI 正在思考中...";
        setTimeout(() => {
            if (isGobangGameOver) return;
            const aiMove = findBestGobangMove();
            if (aiMove) {
                makeGobangMove(aiMove.r, aiMove.c, 2);
                if (checkGobangWin(aiMove.r, aiMove.c, 2)) {
                    document.getElementById('gobang-status').innerText = "AI 赢了，继续加油！";
                    isGobangGameOver = true;
                } else {
                    document.getElementById('gobang-status').innerText = "轮到你了，请落子...";
                }
            }
        }, 400);
    }

    function makeGobangMove(r, c, player) {
        gobangBoardData[r][c] = player;
        const cell = document.querySelector(`.gobang-cell[data-row='${r}'][data-col='${c}']`);
        if (cell) {
            cell.innerText = player === 1 ? "⚫" : "⚪";
        }
    }

    // AI 轻量化扫描选择器
    function findBestGobangMove() {
        // 优先搜寻玩家快要连成4子的位置进行堵截
        for (let r = 0; r < 11; r++) {
            for (let c = 0; c < 11; c++) {
                if (gobangBoardData[r][c] === 0) {
                    gobangBoardData[r][c] = 1;
                    if (checkGobangWin(r, c, 1)) { gobangBoardData[r][c] = 0; return { r, c }; }
                    gobangBoardData[r][c] = 0;
                }
            }
        }
        // 随机搜寻空位落子
        let emptyCells = [];
        for (let r = 0; r < 11; r++) {
            for (let c = 0; c < 11; c++) {
                if (gobangBoardData[r][c] === 0) emptyCells.push({ r, c });
            }
        }
        if (emptyCells.length > 0) {
            return emptyCells[Math.floor(Math.random() * emptyCells.length)];
        }
        return null;
    }

    function checkGobangWin(r, c, p) {
        const dirs = [[1,0], [0,1], [1,1], [1,-1]];
        for (let i = 0; i < dirs.length; i++) {
            let count = 1;
            let d = dirs[i];
            // 正向轴探测
            let nr = r + d[0], nc = c + d[1];
            while (nr >= 0 && nr < 11 && nc >= 0 && nc < 11 && gobangBoardData[nr][nc] === p) { count++; nr += d[0]; nc += d[1]; }
            // 逆向轴探测
            nr = r - d[0]; nc = c - d[1];
            while (nr >= 0 && nr < 11 && nc >= 0 && nc < 11 && gobangBoardData[nr][nc] === p) { count++; nr -= d[0]; nc -= d[1]; }
            if (count >= 5) return true;
        }
        return false;
    }
</script>
